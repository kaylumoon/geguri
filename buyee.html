<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Buyee</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #FFF9F4;
            background-image: 
                radial-gradient(#FDEEF1 20%, transparent 20%),
                radial-gradient(#FDEEF1 20%, transparent 20%);
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #7a6b7e;
        }
        
        .calculator-card {
            background-color: #ffffff;
            border: 6px solid #D6E9DC;
            border-radius: 35px;
            padding: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 0 rgba(214, 233, 220, 0.8);
        }

        .card-inner {
            border: 3px dashed #C6B7CC;
            border-radius: 25px;
            padding: 25px 20px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #C6B7CC;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #FDEEF1;
            margin-bottom: 15px;
        }
        
        .gif-container {
            width: 140px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #F7D9E0;
            background-color: #FFF9F4;
            pointer-events: none; 
        }

        label {
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
            color: #C6B7CC;
            font-size: 16px;
            text-align: center;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #FDEEF1;
            background-color: #FFF9F4;
            border-radius: 20px;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            color: #7a6b7e;
            text-align: center;
            font-weight: 700;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #F7D9E0;
            background-color: #ffffff;
            box-shadow: 0 0 8px rgba(247, 217, 224, 0.5);
        }
        
        button {
            width: 100%;
            background-color: #D6E9DC;
            color: #647d6b;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b1ccb9; 
            transition: all 0.2s;
            font-family: 'Quicksand', sans-serif;
            letter-spacing: 0.5px;
        }
        
        button:hover {
            background-color: #c0d9c7;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b1ccb9;
        }
        
        .result {
            margin-top: 25px;
            padding: 20px;
            background-color: #FDEEF1;
            border-radius: 20px;
            border: 2px dashed #F7D9E0;
            display: none;
        }
        
        .result p {
            margin: 10px 0;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            color: #7a6b7e;
            font-weight: 500;
        }
        
        .result p span:last-child {
            font-weight: 700;
            color: #C6B7CC;
        }
        
        .total {
            font-size: 18px !important;
            font-weight: 700;
            color: #C6B7CC;
            border-top: 2px dashed #F7D9E0;
            padding-top: 15px;
            margin-top: 15px !important;
        }
        
        .payment-info {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #7a6b7e;
            display: none;
            line-height: 1.6;
            background-color: #FFF9F4;
            padding: 15px;
            border-radius: 20px;
            border: 2px dotted #C6B7CC;
        }
        
        .payment-info strong {
            color: #C6B7CC;
            font-size: 15px;
            display: inline-block;
            margin: 5px 0;
            font-weight: 700;
            background-color: #ffffff;
            padding: 4px 12px;
            border-radius: 15px;
            border: 2px solid #F7D9E0;
        }
        
        .sparkle {
            color: #F7D9E0;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="card-inner">
        <h2><span class="sparkle">✧</span> Buyee <span class="sparkle">✧</span></h2>
        
        <div class="gif-container">
            <div class="tenor-gif-embed" data-postid="14222676657062718004" data-share-method="host" data-aspect-ratio="0.937751" data-width="100%"><a href="https://tenor.com/view/hachiware-dance-gif-14222676657062718004">Hachiware Dance GIF</a>from <a href="https://tenor.com/search/hachiware+dance-gifs">Hachiware Dance GIFs</a></div> <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
        </div>
        
        <label for="postUsd">Valor del post exacto en USD</label>
        <input type="number" id="postUsd" placeholder="✿ Ej: 10,55 ✿" min="0" step="0.01">
        
        <button onclick="calculateBuyee()">Calcular Total</button>

        <div class="result" id="resultDiv">
            <p><span>Valor del Post:</span> <span>$<span id="outPost">0</span> USD</span></p>
            <p class="total"><span>Total con fees:</span> <span>$<span id="outTotalArs">0</span></span></p>
        </div>

        <div class="payment-info" id="paymentInfo">
            Abonar al alias <br>
            <strong>CHAEWONDETRIPLES</strong> <br>
            (a nombre de Kaylee Smith) <br>
            Pasame el link de tu post deseado por Whatsapp y comprobante de tu pago! ✿
        </div>
    </div>
</div>

<script>
    function calculateBuyee() {
        const postUsdInput = document.getElementById('postUsd').value;
        const postUsd = parseFloat(postUsdInput);

        if (isNaN(postUsd) || postUsd <= 0) {
            alert("Por favor, ingresá un valor válido mayor a 0!!");
            return;
        }

        const feeUsd = 3.5;
        const totalUsd = postUsd + feeUsd;
        const totalArs = totalUsd * 1480;

        const formatUsd = (num) => {
            return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };
        
        const formatArs = (num) => {
            return num.toLocaleString('es-AR', { maximumFractionDigits: 0 }); 
        };

        document.getElementById('outPost').innerText = formatUsd(postUsd);
        document.getElementById('outTotalUsd').innerText = formatUsd(totalUsd);
        document.getElementById('outTotalArs').innerText = formatArs(totalArs);
        
        document.getElementById('resultDiv').style.display = 'block';
        document.getElementById('paymentInfo').style.display = 'block';
    }
</script>

</body>
</html>
