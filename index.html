<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Geguri Casilla</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            /* Fondo celeste pastel con puntitos blancos */
            background-color: #dcf2f9;
            background-image: 
                radial-gradient(#ffffff 20%, transparent 20%),
                radial-gradient(#ffffff 20%, transparent 20%);
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px;
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #8c6b6b; /* Color de texto marrón suave (típico en diseños kawaii) */
        }
        
        .calculator-card {
            background-color: #ffffff;
            border: 6px solid #dcf2f9; /* Borde celeste grueso como en la foto */
            border-radius: 35px; /* Bordes muy redondeados */
            padding: 10px; /* Espacio para el borde punteado interno */
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 0 rgba(220, 242, 249, 0.8); /* Sombrita celeste abajo */
        }

        .card-inner {
            border: 3px dashed #fbdce2; /* Borde punteado rosa pastel */
            border-radius: 25px;
            padding: 25px 20px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #f18fb4; /* Rosa vibrante pastel */
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #fdf0f4;
            margin-bottom: 15px;
        }
        
        /* Estilos para la foto en forma de corazón */
        .heart-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            display: block;
            margin: 0 auto 20px;
            background-color: #fdf0f4; 
            
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }

        label {
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
            color: #92d3a3; /* Verde pastel */
            font-size: 16px;
            text-align: center;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 2px solid #fbdce2;
            background-color: #fffafb;
            border-radius: 20px; /* Forma de píldora */
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            color: #8c6b6b;
            text-align: center;
            font-weight: 700;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #f18fb4;
            background-color: #ffffff;
            box-shadow: 0 0 8px rgba(241, 143, 180, 0.3);
        }
        
        button {
            width: 100%;
            background-color: #c5eaa6; /* Verde clarito de tu imagen de referencia */
            color: #6a8c4f; /* Texto verde más oscurito */
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 20px; /* Píldora */
            cursor: pointer;
            box-shadow: 0 4px 0 #a9d486; /* Efecto 3D tierno */
            transition: all 0.2s;
            font-family: 'Quicksand', sans-serif;
            letter-spacing: 0.5px;
        }
        
        button:hover {
            background-color: #bdf096;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a9d486; /* Se achica la sombra al apretar */
        }
        
        .result {
            margin-top: 25px;
            padding: 20px;
            background-color: #fef4f6; /* Fondo rosita muy claro */
            border-radius: 20px;
            border: 2px dashed #fbdce2;
            display: none;
        }
        
        .result p {
            margin: 10px 0;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            color: #8c6b6b;
            font-weight: 500;
        }
        
        .result p span:last-child {
            font-weight: 700;
            color: #f18fb4; /* Números en rosa fuerte */
        }
        
        .total {
            font-size: 18px !important;
            font-weight: 700;
            color: #f18fb4;
            border-top: 2px dashed #fbdce2;
            padding-top: 15px;
            margin-top: 15px !important;
        }
        
        .payment-info {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #8c6b6b;
            display: none;
            line-height: 1.6;
            background-color: #ebf8ef; /* Fondito verde super claro */
            padding: 15px;
            border-radius: 20px;
            border: 2px dotted #a9d486;
        }
        
        .payment-info strong {
            color: #f18fb4;
            font-size: 15px;
            display: inline-block;
            margin: 5px 0;
            font-weight: 700;
            background-color: #ffffff;
            padding: 4px 12px;
            border-radius: 15px;
            border: 2px solid #fbdce2;
        }
        
        /* Decoraciones estilo chispitas */
        .sparkle {
            color: #fcd873;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="card-inner">
        <h2><span class="sparkle">✧</span> Cotizador <span class="sparkle">✧</span></h2>
        
        <img src="foto.gif" alt="Jihyo" class="heart-img">
        
        <label for="lotPrice">Valor Base (USD)</label>
        <input type="number" id="lotPrice" placeholder="✿ Ej: 15 ✿" min="0" step="1">
        
        <button onclick="calculateTotal()">Calcular Total</button>

        <div class="result" id="resultDiv">
            <p><span>Base ingresada:</span> <span><span id="outBase">0</span> USD</span></p>
            <p><span>Valor en USD (x1350):</span> <span>$<span id="outCost">0</span></span></p>
            <p><span>Fees + Envío:</span> <span>$<span id="outFee">0</span></span></p>
            <p class="total"><span>Total final:</span> <span>$<span id="outTotal">0</span></span></p>
        </div>

        <div class="payment-info" id="paymentInfo">
            Abonar al alias <br>
            <strong>CHAEWONDETRIPLES</strong> <br>
            (a nombre de Kaylee Smith) <br>
            y adjuntar comprobante a mi Whatsapp ✿
        </div>
    </div>
</div>

<script>
    function calculateTotal() {
        const lotPriceInput = document.getElementById('lotPrice').value;
        const baseValue = parseFloat(lotPriceInput);

        if (isNaN(baseValue) || baseValue <= 0) {
            alert("¡Ups! Por favor, ingresa un valor mayor a 0 🌸");
            return;
        }

        const itemCost = baseValue * 1350;

        let fee = 0;
        if (baseValue < 30) {
            fee = ((3086 + (baseValue * 41.7)) * 1.03) + (baseValue * 30);
        } else {
            fee = ((3086 + (baseValue * 69.3)) * 1.03) + (baseValue * 30);
        }

        // Aumento del 2% sobre el fee total calculado
        fee = fee * 1.02;

        fee = Math.round(fee);

        const total = itemCost + fee;

        const formatNumber = (num) => {
            return num.toLocaleString('es-AR');
        };

        document.getElementById('outBase').innerText = baseValue;
        document.getElementById('outCost').innerText = formatNumber(itemCost);
        document.getElementById('outFee').innerText = formatNumber(fee);
        document.getElementById('outTotal').innerText = formatNumber(total);
        
        document.getElementById('resultDiv').style.display = 'block';
        document.getElementById('paymentInfo').style.display = 'block';
    }
</script>

</body>
</html>
